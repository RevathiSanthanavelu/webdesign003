<!DOCTYPE html>

<head>
    <title>Find Numeric Value</title>
    <script>
        function btnFind_onclick(){
            var en = 0;

            en = tbxen.value;
            en = parseFloat(en);
            if (isNaN(en)){
                chbxval.checked = false;
                spnval.innerText = "Invalid"
            }
            else{
                chbxval.checked = true;
                spnval.innerText = "Valid"
            }
        }
    </script>
</head>

<table border="1">
    <tr>
        <td>Enter a Number</td>
        <td>
            <input type="text" id="tbxen" placeholder="0" step="any">
        </td>
    </tr>
    <tr>
        <td>Is Valid</td>
        <td>
            <input type="checkbox" id="chbxval"disabled="disabled">
            <span id="spnval">Invalid</span>
        </td>
    </tr>
    <tr>
        <td>
            <button onclick="location.href='isnumeric1.chbx.html'">Cancel</button>
        </td>
        <td>
            <button onclick="btnFind_onclick();">Find</button>
        </td>
    </tr>
</table>
