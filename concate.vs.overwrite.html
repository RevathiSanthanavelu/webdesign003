<span id="spnop1">
    wait...
</span>

<span id="spnop2">
    wait...
</span>

<script>
    // 'op' stand for 'output'
    // example for 'Append'
    var op="";
    op = "sun";
    op += "<br>mon";
    op += "<br>tue";
    spnop1.innerHTML = op;

    // example for 'Overwrite'
    op = "<br>wed";
    op = "<br>thu";
    op = "<br>fri";
    spnop2.innerHTML = op;		
</script>

<!-- 
Append vs. Overwrite

'Append' 
Add new content after on old content

'Overwrite'
Add new content after erase on old content
-->
