<!DOCTYPE html>
<head>
    <title>Elecricity Bill</title>
    <link rel="stylesheet" href="eb001.css">
    <script src="eb001a.js"></script>
    <script src="eb001b.js"></script>
</head>
<table border="1">
    <tr>
        <td>Consumer ID</td>
        <td>
            <input type="number" id="numcid" placeholder="0">
        </td>
    </tr>
    <tr>
        <td>Previous Reading</td>
        <td>
            <input type="number" id="numpr" placeholder="0">
        </td>
    </tr>
    <tr>
        <td>Current Reading</td>
        <td>
            <input type="number" id="numcr" placeholder="0">
        </td>
    </tr>
    <tr>
        <td>Consumer Category</td>
        <td>
            <select id="cmbbxcc">
                <option value="Agriculture">Agriculture</option>
                <option value="Domestic">Domestic</option>
                <option value="Commercial" selected="selected">Commercial</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Net Reading</td>
        <td>
            <input type="number" id="numnr" placeholder="0" readonly="readonly">
        </td>
    </tr>
    <tr>
        <td>
            <button onclick="location.href='eb001.html';">Cancel</button>
        </td>
        <td>
            <button onclick="btnFind_onclick();">Find</button>
        </td>
    </tr>
    <tr>
        <td colspan="2">
            <table border="1">
                <thead>
                    <th>Units Group</th>
                    <th>Consume Units</th>
                    <th>Per Unit Amount</th>
                    <th>Consume Units Amount</th>
                </thead>
                <tr>
                    <td>000 - 100</td>
                    <td>
                        <input type="number" id="numcuu100" placeholder="0" readonly="readonly">
                    </td>
                    <td>
                        <input type="number" id="numpuau100" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                    <td>                        
                        <input type="number" id="numcuau100" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                </tr>
                <tr>
                    <td>101 - 200</td>
                    <td>
                        <input type="number" id="numcuu200" placeholder="0" readonly="readonly">
                    </td>
                    <td>
                        <input type="number" id="numpuau200" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                    <td>                        
                        <input type="number" id="numcuau200" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                </tr>
                <tr>
                    <td>201 - 400</td>
                    <td>
                        <input type="number" id="numcuu400" placeholder="0" readonly="readonly">
                    </td>
                    <td>
                        <input type="number" id="numpuau400" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                    <td>                        
                        <input type="number" id="numcuau400" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                </tr>
                <tr>
                    <td>401 - ...</td>
                    <td>
                        <input type="number" id="numcua400" placeholder="0" readonly="readonly">
                    </td>
                    <td>
                        <input type="number" id="numpuaa400" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                    <td>                        
                        <input type="number" id="numcuaa400" placeholder="0.0" step="any" readonly="readonly">
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td>Tax %</td>
        <td>
            <input type="number" id="numtip" placeholder="0.0" step="any" readonly="readonly">
        </td>
    </tr>
    <tr>
        <td>Tax Amount</td>
        <td>
            <input type="number" id="numtia" placeholder="0.0" step="any" readonly="readonly">
        </td>
    </tr>
    <tr>
        <td>Meter Charge</td>
        <td>
            <input type="number" id="nummc" placeholder="0.0" step="any" readonly="readonly">
        </td>
    </tr>
    <tr>
        <td>Net Pay</td>
        <td>
            <input type="number" id="numnp" placeholder="0.0" step="any" readonly="readonly">
        </td>
</table>
