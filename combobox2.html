<!DOCTYPE html>
<head>
    <title>Combobox2</title>
    <script>
        function btncmbxcc_onclick(){
            document.title=cmbbxcc.value;
        }
    </script>
</head>

<select id="cmbbxcc" oninput="btncmbxcc_onclick();">
    <option value="Agriculture">Agriculture</option>
    <option value="Domestic">Domestic</option>
    <option value="Commercial" selected="selected">Commercial</option>
</select>
