<!DOCTYPE html>
<head>
    <title>Radio Button to select drinks</title>
</head>
<table border="1">
    <tr>
        <td>Hot Drink</td>
        <td>Cool Drink</td>
        <td>Soft Drink</td>
    </tr>

    <tr>
        <td>
            <input type="radio" id="rdobtntea" name="rdobtn_hotdrinks">Tea
        </td>
        <td>
            <input type="radio" id="rdobtn7up" name="rdobtn_cooldrinks">7Up
        </td>
        <td>
            <input type="radio" id="rdobtnorange" name="rdobtn_softdrinks">Orange Juice
        </td>
    </tr>

    <tr>
        <td>
            <input type="radio" id="rdobtncoffee" name="rdobtn_hotdrinks">Coffee
        </td>
        <td>
            <input type="radio" id="rdobtnpepsi" name="rdobtn_cooldrinks">Pepsi
        </td>
        <td>
            <input type="radio" id="rdobtnapple" name="rdobtn_softdrinks">Apple Juice
        </td>
    </tr>

    <tr>
        <td>
            <input type="radio" id="rdobtnmilk" name="rdobtn_hotdrinks">Milk
        </td>
        <td>
            <input type="radio" id="rdobtncoke" name="rdobtn_cooldrinks">Coke
        </td>
        <td>
            <input type="radio" id="rdobtngrape" name="rdobtn_softdrinks">Grape Juice
        </td>
    </tr>
</table>

<script>
    rdobtngrape.checked = disabled;
</script>
