<!DOCTYPE html>

<script>
    function uToFloat(s){
        var n = parseFloat(s);
        n = isNaN(n) ? 0 : n;
        return n;
    }

    function btnFind_onclick(){
        //below initialize variable
        var m1 = 0, m2 = 0, total = 0, avg = 0;

        m1 = uToFloat(numm1.value);
        m2 = uToFloat(numm2.value);

        if(m1>=0 && m2>=0){
        total = m1+m2;
        avg = total/2;

        if (avg <= 100 && avg >97){
            grade = "O Grade"
        }
        else if (avg <= 97 && avg >89){
            grade = "A+ Grade"
        }
        else if (avg <= 89 && avg >84){
            grade = "A Grade"
        }
        else if (avg <=84  && avg >79){
            grade = "B Grade"
        }

        if (m1 > 34.4 && m2 > 34.4){
            rdobtnPass.checked = true;
        }
        else {
            rdobtnFail.checked = true
        }
        }
        else{
            m1 = 0;
            m2 = 0;
        }

        numm1.value = m1;
        numm2.value = m2;
        numtotal.value = total;
        numavg.value = avg;
    };
</script>

<head>
    <title>Exam Result</title>
</head>

<table border="1">
    <tr>
        <td>Roll No</td>
        <td>
            <input 
            type="number"
            id="numrno"
            placeholder="0"
            >
        </td>
    </tr>

    <tr>
        <td>Student Name</td>
        <td>
            <input 
            type="text"
            id="tbxsname"
            placeholder="unknown"
            >
        </td>
    </tr>

    <tr>
        <td>M1</td>
        <td>
            <input 
            type="number"
            id="numm1"
            placeholder="0.0"
            step="any"
            >
        </td>
    </tr>

    <tr>
        <td>M2</td>
        <td>
            <input 
            type="number"
            id="numm2"
            placeholder="0.0"
            step="any"
            >
        </td>
    </tr>

    <tr>
        <td>Total</td>
        <td>
            <input 
            type="number"
            id="numtotal"
            placeholder="0.0"
            step="any"
            readonly
            >
        </td>
    </tr>

    <tr>
        <td>Average</td>
        <td>
            <input 
            type="number"
            id="numavg"
            placeholder="0.0"
            step="any"
            readonly
            >
        </td>
    </tr>

    <tr>
        <td>Result</td>
        <td>
            <input 
            type="radio"
            name="result"
            id="rdobtnPass"
            value="Pass"
            disabled = "disabled"
            >Pass
            <input 
            type="radio"
            name="result"
            id="rdobtnFail"
            value="Fail"
            disabled = "disabled"
            >Fail
        </td>
    </tr>

    <tr>
        <td>
            <input  
            type="button"
            value="Cancel"
            onclick="location.href='p0013er.radio.html';"
            >
        </td>
        <td>
            <input 
            type="button"
            value="Find"
            onclick="btnFind_onclick();"
            >
        </td>
    </tr>
</table>
