<!DOCTYPE html>
<head>
    <title>Combo Box For select drinks</title>
</head>

<table>
    <tr>
        <td>Hot Drinks
            <select id="cmbbxhdrinks">
                <option value="Tea">Tea</option>
                <option value="Coffee">Coffee</option>
                <option value="Milk" selected="selected">Milk</option>
            </select>
        </td>

        <td>Cool Drinks
            <select id="cmbbxcdrinks">
                <option value="7up">7UP</option>
                <option value="Pepsi">Pepsi</option>
                <option value="Coke" selected="selected">Coke</option>
            </select>
        </td>

        <td>Hot Drinks
            <select id="cmbbxsdinks">
                <option value="Orange">Orange</option>
                <option value="Apple">Apple</option>
                <option value="Grape" selected="selected">Grape</option>
            </select>
        </td>
    </tr>
    <br>
</table>
