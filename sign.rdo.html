<!DOCTYPE html>
<head>
    <title>Signature</title>

    <script>
        function btnFind_onclick(){
            var n = 0;

            n = numn.value;
            n = parseFloat(n);
            n = isNaN(n) ? 0 : n;

            if(n > 0){
                rdobtnptve.checked = true;
            }
            else if(n < 0){
                rdobtnntve.checked = true;
            }
            else{
                rdobtnntrl.checked = true;
            }

            numn.value = n;
        }
    </script>
</head>
<table border="1">
    <tr>
        <td>Enter a Numeric Value</td>
        <td>
            <input type="number" id="numn" placeholder="0.0" step="any">
        </td>
    </tr>
    <tr>
        <td>Signature</td>
        <td>
            <input type="radio" id="rdobtnptve" name="op" disabled="disabled"> Positive
            <input type="radio" id="rdobtnntrl" name="op" disabled="disabled"> Neutral
            <input type="radio" id="rdobtnntve" name="op" disabled="disabled"> Negative
        </td>
    </tr>
    <tr>
        <td>
            <button onclick="location.href='sign1.html';">Cancel</button>
        </td>
        <td>
            <button onclick="btnFind_onclick();">Find</button>
        </td>
    </tr>
